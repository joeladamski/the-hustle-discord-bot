version: '3.9'

services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: the-hustle-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - bot_data:/app/data
      - ./config:/app/config:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  bot_data:
